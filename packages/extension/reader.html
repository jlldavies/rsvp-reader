<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>RSVP Speed Reader</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Roboto+Mono:wght@400;500&family=Space+Mono&family=Courier+Prime&display=swap" rel="stylesheet">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
      @keyframes rsvp-flash {
        from { opacity: 0.2; }
        to   { opacity: 1; }
      }
      .rsvp-flash { animation: rsvp-flash 80ms ease-out; }
      :root {
        --color-bg: #ffffff;
        --color-bg-secondary: #fafafa;
        --color-bg-input: #ffffff;
        --color-border: #e0e0e0;
        --color-border-light: #f0f0f0;
        --color-text: #1a1a1a;
        --color-text-muted: #888888;
        --color-text-subtle: #555555;
        --color-word-prefix: #333333;
        --color-word-suffix: #333333;
        --color-accent: #2563eb;
        --color-accent-bg: #eff6ff;
        --color-accent-text: #2563eb;
        --color-btn-bg: #ffffff;
        --color-btn-border: #cccccc;
        --color-preview-current-bg: #fef3c7;
        --color-preview-current-text: #92400e;
        --color-preview-current-border: #f59e0b;
        --color-preview-past: #9ca3af;
        --color-error-bg: #fff0f0;
        --color-error-border: #ffcccc;
        --color-error-text: #cc0000;
        --color-warn-bg: #fff7ed;
        --color-warn-border: #fed7aa;
        --color-warn-text: #c2410c;
      }
      .dark {
        --color-bg: #0f172a;
        --color-bg-secondary: #1e293b;
        --color-bg-input: #1e293b;
        --color-border: #334155;
        --color-border-light: #293548;
        --color-text: #f1f5f9;
        --color-text-muted: #94a3b8;
        --color-text-subtle: #94a3b8;
        --color-word-prefix: #cbd5e1;
        --color-word-suffix: #cbd5e1;
        --color-accent: #60a5fa;
        --color-accent-bg: #1e3a5f;
        --color-accent-text: #60a5fa;
        --color-btn-bg: #1e293b;
        --color-btn-border: #475569;
        --color-preview-current-bg: #451a03;
        --color-preview-current-text: #fde68a;
        --color-preview-current-border: #d97706;
        --color-preview-past: #475569;
        --color-error-bg: #2d0000;
        --color-error-border: #7f1d1d;
        --color-error-text: #fca5a5;
        --color-warn-bg: #431407;
        --color-warn-border: #9a3412;
        --color-warn-text: #fed7aa;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/reader-page/reader-page.tsx"></script>
  </body>
</html>
